site_name: A2UI
site_url: https://a2ui-labs.github.io/docs-zh-hans/
site_description: A2UI, a streaming protocol for Agent-Driven User Interfaces
site_author: Google
site_dir: site

extra:
  analytics:
    provider: google
    property: G-YX9TPV8DCC
  consent:
      title: Cookie consent
      description: >-
        We use cookies to recognize repeated visits and preferences,
        as well as to measure the effectiveness of our documentation and
        whether users find the information they need. With your consent,
        you're helping us to make our documentation better.

nav:
  - 首页: index.md
  - 简介与常见问题:
      - 什么是 A2UI？: introduction/what-is-a2ui.md
      - 适合谁？: introduction/who-is-it-for.md
      - 如何使用？: introduction/how-to-use.md
      - A2UI 与其他方案如何比较？: introduction/agent-ui-ecosystem.md
  - 快速开始: quickstart.md
  - A2UI Composer ⭐: composer.md
  - 核心概念:
      - 概览: concepts/overview.md
      - 数据流: concepts/data-flow.md
      - 组件与结构: concepts/components.md
      - 数据绑定: concepts/data-binding.md
      - 组件目录: concepts/catalogs.md
      - 传输层: concepts/transports.md
      - Actions: concepts/actions.md
  - 指南:
      - 客户端集成: guides/client-setup.md
      - Agent 开发: guides/agent-development.md
      - 在任意 Agent 框架中使用 A2UI (AG-UI): guides/a2ui-with-any-agent-framework.md
      - Renderer 开发: guides/renderer-development.md
      - 定义你自己的 Catalog: guides/defining-your-own-catalog.md
      - 编写自定义组件: guides/authoring-components.md
      - 主题与样式: guides/theming.md
      - 通过 MCP 使用 A2UI: guides/a2ui_over_mcp.md
      - A2UI 中的 MCP Apps: guides/mcp-apps-in-a2ui.md
      - MCP Apps 中的 A2UI: guides/a2ui-in-mcp-apps.md
  - 参考:
      - 组件画廊: reference/components.md
      - 消息参考: reference/messages.md
      - Renderer（客户端）: reference/renderers.md
      - Agent（服务端）: reference/agents.md
  - 规范:
      - v0.8（稳定版）:
          - A2UI 协议: specification/v0.8-a2ui.md
          - A2A 扩展: specification/v0.8-a2a-extension.md
      - v0.9（草案）:
          - A2UI 协议: specification/v0.9-a2ui.md
          - 演进指南: specification/v0.9-evolution-guide.md
  - 生态:
      - A2UI 的真实案例: ecosystem/a2ui-in-the-world.md
      - 社区 Renderer: ecosystem/renderers.md
      - 社区: ecosystem/community.md
  - 路线图: roadmap.md

exclude_docs: |
  scripts/**

repo_name: google/A2UI
repo_url: https://github.com/google/A2UI
edit_uri: raw/main/docs/

copyright: Copyright Google 2025&nbsp;&nbsp;|&nbsp;&nbsp;<a href="//policies.google.com/terms">Terms</a>&nbsp;&nbsp;|&nbsp;&nbsp;<a href="//policies.google.com/privacy">Privacy</a>&nbsp;&nbsp;|&nbsp;&nbsp;<a href="#__consent">Manage cookies</a>

extra_css:
  - stylesheets/custom.css

theme:
  name: material
  font:
    text: Google Sans
    code: Roboto Mono
  logo: assets/A2UI_light.svg
  favicon: assets/A2UI_dark.svg
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: fontawesome/solid/note-sticky
      abstract: fontawesome/solid/book
      info: fontawesome/solid/circle-info
      tip: fontawesome/solid/bullhorn
      success: fontawesome/solid/check
      question: fontawesome/solid/circle-question
      warning: fontawesome/solid/triangle-exclamation
      failure: fontawesome/solid/bomb
      danger: fontawesome/solid/skull
      bug: fontawesome/solid/robot
      example: fontawesome/solid/flask
      quote: fontawesome/solid/quote-left
  palette:
    - scheme: default
      primary: teal
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - scheme: slate
      primary: teal
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - announce.dismiss
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.top
    - navigation.tracking
    - toc.follow

markdown_extensions:
  - meta
  - footnotes
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      url_download: true
      dedent_subsections: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

hooks:
  - hooks.py

plugins:
  - search
  - macros
  - mermaid2
  - redirects:
      redirect_maps:
        'catalogs.md': 'concepts/catalogs.md'
        'transports.md': 'concepts/transports.md'
        'client_to_server_actions.md': 'concepts/actions.md'
        'concepts/client_to_server_actions.md': 'concepts/actions.md'
        'actions.md': 'concepts/actions.md'
        'renderers.md': 'reference/renderers.md'
        'agents.md': 'reference/agents.md'
        'community.md': 'ecosystem/community.md'
        'introduction/where-is-it-used.md': 'ecosystem/a2ui-in-the-world.md'
        'guides/custom-components.md': 'guides/authoring-components.md'
        'guides/guide_a2ui_dynamic_mcp.md': 'guides/a2ui-in-mcp-apps.md'
        'guides/mcp-apps-in-a2ui-surface.md': 'guides/mcp-apps-in-a2ui.md'
